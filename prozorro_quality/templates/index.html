{% extends "base.html" %}
{% block title %}Панель якості тендерів{% endblock %}
{% block content %}
<div
  id="dashboard-root"
  data-api-url="/api/results"
  data-default-pages="{{ settings.default_max_pages }}"
  data-initial-tender-id="{{ initial_tender_id or '' }}"
></div>
<noscript>
  <section class="empty-state">
    <h1>Панель потребує JavaScript</h1>
    <p>Увімкніть JavaScript, щоб переглянути React dashboard якості тендерної документації.</p>
  </section>
</noscript>
{% endblock %}
{% block scripts %}
<script type="module" src="{{ url_for('static', path='dashboard/dashboard.js') }}"></script>
{% endblock %}
